name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          # PRPeek targets macOS 26 (Tahoe) + Swift 6.2. Needs a runner image
          # whose Xcode ships the macOS 26 SDK. 'latest-stable' picks the newest
          # available; if the hosted image lags, pin a specific Xcode_26.x here.
          xcode-version: latest-stable
      - name: swift test
        run: swift test
